name: Deploy Playground

on:
  push:
    branches: [master]
    paths:
      - "packages/playground/**"
      - "packages/celox/dist/**"
      - "crates/celox-napi/**"
      - ".github/workflows/playground.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust
        with:
          targets: wasm32-wasip1-threads

      - name: Install WASI SDK
        run: |
          curl -fsSL https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-25/wasi-sdk-25.0-x86_64-linux.tar.gz | tar xz -C /opt
          echo "WASI_SDK_PATH=/opt/wasi-sdk-25.0-x86_64-linux" >> "$GITHUB_ENV"
          echo "CC_wasm32_wasip1_threads=/opt/wasi-sdk-25.0-x86_64-linux/bin/clang" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NAPI (native, for TS package build)
        run: pnpm build:napi

      - name: Build TS package
        run: pnpm --filter @celox-sim/celox build

      - name: Build NAPI WASM
        run: pnpm --filter @celox-sim/celox-napi exec napi build --platform --target wasm32-wasip1-threads --manifest-path ../../Cargo.toml -p celox-napi

      - name: Build Playground
        run: pnpm --filter @celox-sim/playground build
        env:
          PLAYGROUND_BASE: /celox/playground/

      # Monaco editor plugin outputs workers under {base}/monacoeditorwork/ inside dist,
      # creating a nested celox/playground/ subdirectory. Flatten it so the files sit at
      # dist/monacoeditorwork/ (which maps to /celox/playground/monacoeditorwork/ after deploy).
      - name: Flatten Monaco worker path in dist
        run: |
          if [ -d packages/playground/dist/celox/playground/monacoeditorwork ]; then
            mv packages/playground/dist/celox/playground/monacoeditorwork packages/playground/dist/
            rm -rf packages/playground/dist/celox
          fi

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/playground/dist
          destination_dir: playground
          keep_files: false
