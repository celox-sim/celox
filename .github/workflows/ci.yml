name: CI

on:
  push:
    branches: [master]
  pull_request:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: "0"

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-rust

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --locked -p celox -p celox-macros -p celox-napi -p celox-ts-gen --all-targets --no-deps

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm run lint

  rust:
    name: Rust Test & NAPI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-rust

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NAPI (debug)
        run: pnpm run build:napi

      - name: Upload NAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: napi-linux-x64-gnu
          path: |
            crates/celox-napi/celox.linux-x64-gnu.node
            crates/celox-napi/index.js
            crates/celox-napi/index.d.ts

  napi-windows:
    name: NAPI Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-rust

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NAPI (debug)
        run: pnpm run build:napi

      - name: Upload NAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: napi-win32-x64-msvc
          path: |
            crates/celox-napi/celox.win32-x64-msvc.node
            crates/celox-napi/index.js
            crates/celox-napi/index.d.ts

  napi-linux-arm64:
    name: NAPI Build (Linux ARM64 GNU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-rust
        with:
          targets: aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build NAPI (Linux ARM64 GNU)
        working-directory: crates/celox-napi
        run: npx napi build --platform --manifest-path ../../Cargo.toml -p celox-napi --target aarch64-unknown-linux-gnu --use-napi-cross

      - name: Upload NAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: napi-linux-arm64-gnu
          path: |
            crates/celox-napi/celox.linux-arm64-gnu.node
            crates/celox-napi/index.js
            crates/celox-napi/index.d.ts

  js-ubuntu:
    name: JS Test (Ubuntu)
    needs: rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Download NAPI artifact
        uses: actions/download-artifact@v4
        with:
          name: napi-linux-x64-gnu
          path: crates/celox-napi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Prepare template for local package validation
        working-directory: examples/template
        run: |
          node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.devDependencies['@celox-sim/celox']='link:../../packages/celox'; pkg.devDependencies['@celox-sim/vite-plugin']='link:../../packages/vite-plugin'; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"
          pnpm install --ignore-workspace --no-frozen-lockfile

      - name: Run template tests
        working-directory: examples/template
        run: pnpm test

      - name: Run tests
        run: pnpm --filter="!@celox-sim/celox-napi" --filter="!@celox-sim/playground" -r test

  js-windows:
    name: JS Test (Windows)
    needs: napi-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Download NAPI artifact
        uses: actions/download-artifact@v4
        with:
          name: napi-win32-x64-msvc
          path: crates/celox-napi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build

      - name: Run tests
        run: pnpm --filter="!@celox-sim/celox-napi" --filter="!@celox-sim/playground" -r test
