<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celox Playground</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }
        header {
            background: #16213e;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #0f3460;
        }
        header h1 {
            font-size: 1.3rem;
            color: #e94560;
            font-weight: 700;
        }
        header select, header button {
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid #0f3460;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 0.9rem;
            cursor: pointer;
        }
        header button {
            background: #e94560;
            color: #fff;
            border-color: #e94560;
            font-weight: 600;
        }
        header button:hover { background: #c73e54; }
        header button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            margin-left: auto;
            font-size: 0.85rem;
            color: #888;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 0;
            height: calc(100vh - 50px);
        }
        .panel {
            display: flex;
            flex-direction: column;
            border: 1px solid #0f3460;
        }
        .panel-header {
            background: #16213e;
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        textarea {
            flex: 1;
            background: #0d1117;
            color: #c9d1d9;
            border: none;
            padding: 12px;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            resize: none;
            tab-size: 4;
            outline: none;
        }
        textarea::placeholder { color: #484f58; }
        #console {
            flex: 1;
            background: #0d1117;
            color: #c9d1d9;
            padding: 12px;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log-info { color: #58a6ff; }
        .log-error { color: #f85149; }
        .log-warn { color: #d29922; }
        .log-success { color: #3fb950; }
    </style>
</head>
<body>
    <header>
        <h1>Celox Playground</h1>
        <select id="examples">
            <option value="">-- Load Example --</option>
            <option value="adder">Adder</option>
            <option value="counter">Counter</option>
        </select>
        <button id="run-btn" disabled>Run</button>
        <span class="status" id="status">Loading WASM...</span>
    </header>
    <div class="container">
        <div class="panel">
            <div class="panel-header">Veryl Source</div>
            <textarea id="veryl-source" placeholder="Enter Veryl code here..." spellcheck="false"></textarea>
        </div>
        <div class="panel">
            <div class="panel-header">Testbench (JavaScript)</div>
            <textarea id="testbench" placeholder="Write testbench JS here..." spellcheck="false"></textarea>
        </div>
        <div class="panel" style="grid-column: 1 / -1;">
            <div class="panel-header">Console Output</div>
            <div id="console"></div>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
