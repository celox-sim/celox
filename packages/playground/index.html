<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celox Playground</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            overflow: hidden;
        }
        header {
            background: #16213e;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #0f3460;
            height: 46px;
        }
        header h1 {
            font-size: 1.2rem;
            color: #e94560;
            font-weight: 700;
        }
        header select, header button {
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid #0f3460;
            background: #1a1a2e;
            color: #e0e0e0;
            font-size: 0.85rem;
            cursor: pointer;
        }
        header button {
            background: #e94560;
            color: #fff;
            border-color: #e94560;
            font-weight: 600;
        }
        header button:hover { background: #c73e54; }
        header button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status {
            margin-left: auto;
            font-size: 0.8rem;
            color: #888;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 200px;
            gap: 0;
            height: calc(100vh - 46px);
        }
        .panel {
            display: flex;
            flex-direction: column;
            border: 1px solid #0f3460;
            overflow: hidden;
        }
        .panel-header {
            background: #16213e;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            flex-shrink: 0;
        }
        .editor-container {
            flex: 1;
            overflow: hidden;
        }
        #console {
            flex: 1;
            background: #0d1117;
            color: #c9d1d9;
            padding: 8px 12px;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            font-size: 0.8rem;
            line-height: 1.4;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log-info { color: #58a6ff; }
        .log-error { color: #f85149; }
        .log-warn { color: #d29922; }
        .log-success { color: #3fb950; }
    </style>
</head>
<body>
    <header>
        <h1>Celox Playground</h1>
        <select id="examples">
            <option value="">-- Example --</option>
            <option value="adder">Adder</option>
            <option value="counter">Counter</option>
        </select>
        <button id="run-btn" disabled>Run</button>
        <span class="status" id="status">Loading...</span>
    </header>
    <div class="container">
        <div class="panel">
            <div class="panel-header">Veryl Source</div>
            <div class="editor-container" id="veryl-editor-container"></div>
        </div>
        <div class="panel">
            <div class="panel-header">Testbench (JavaScript)</div>
            <div class="editor-container" id="tb-editor-container"></div>
        </div>
        <div class="panel" style="grid-column: 1 / -1;">
            <div class="panel-header">Console Output</div>
            <div id="console"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
    <script>
        // Configure Monaco loader
        require.config({
            paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' }
        });

        window.__monacoReady = new Promise(resolve => {
            require(['vs/editor/editor.main'], resolve);
        });
    </script>
    <script type="module" src="./main.js"></script>
</body>
</html>
