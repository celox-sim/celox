pre-push:
  piped: true
  commands:
    submodule-check:
      priority: 1
      run: bash scripts/check-submodules.sh
    cargo-fmt:
      priority: 2
      run: cargo fmt --all -- --check
    biome:
      priority: 2
      run: pnpm run lint
    cargo-clippy:
      priority: 3
      run: cargo clippy -p celox -p celox-macros -p celox-napi -p celox-ts-gen --all-targets
    test:
      priority: 4
      run: pnpm test
